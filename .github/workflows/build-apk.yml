name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: setup pnpm
        uses: pnpm/action-setup@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: setup Android SDK
        uses: android-actions/setup-android@v4

      - name: install NDK
        run: sdkmanager "ndk;28.2.13676358"

      - name: install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: copy vendor assets
        run: pnpm --filter @readest/readest-app setup-vendors

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - uses: Swatinem/rust-cache@v2
        with:
          key: android-aarch64-cargo

      - name: create .env.local file (bypass dotenv quote issues)
        run: |
          cat >> apps/readest-app/.env.local << 'ENVEOF'
          NEXT_PUBLIC_APP_PLATFORM=tauri
          NEXT_PUBLIC_API_BASE_URL=https://api.readest-cloud.my.id
          NEXT_PUBLIC_DEFAULT_SUPABASE_URL_BASE64=aHR0cHM6Ly9hcGkucmVhZGVzdC1jbG91ZC5teS5pZA==
          NEXT_PUBLIC_DEFAULT_SUPABASE_KEY_BASE64=ZXlKaGJHY2lPaUpJVXpJMU5pSXNJblI1Y0NJNklrcFhWQ0o5LmV5SnliMnhsSWpvaVlXNXZiaUo5LlAwTTJfR1dVTm5laXdqVUdqakFkR3VYLXJpV0ltRWR3YWlsa2x0bUIxb0E=
          NEXT_PUBLIC_DEFAULT_POSTHOG_URL_BASE64=aHR0cHM6Ly91cy5pLnBvc3Rob2cuY29t
          NEXT_PUBLIC_DEFAULT_POSTHOG_KEY_BASE64=cGhjX0x3ekhZRWtsZUVub3ZSc05ZQlRpTVRTV2MyS1NUOFdZMzBIWWFhN0ZPa1IK
          ENVEOF

      - name: build debug APK (aarch64)
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/28.2.13676358
        run: |
          cd apps/readest-app
          rm -rf src-tauri/gen/android
          pnpm tauri android init
          pnpm tauri icon ../../data/icons/readest-book.png
          git checkout .
          pnpm tauri android build --debug --target aarch64

      - name: upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: readest-debug-aarch64
          path: apps/readest-app/src-tauri/gen/android/app/build/outputs/apk/universal/debug/app-universal-debug.apk
          retention-days: 30
